<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>One Joke</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f7f9;
        color: #18212b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(680px, 100%);
      }

      p {
        margin: 0;
        max-width: 28rem;
        font-size: clamp(1.1rem, 4vw, 1.7rem);
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <main>
      <p>I bought an EV to feel futuristic. Now I spend every road trip negotiating with a vending machine that sells electricity.</p>
    </main>
  </body>
</html>
