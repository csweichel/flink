version: 2

project_name: flink

before:
  hooks:
    - make frontend-build

builds:
  - id: flink
    main: ./cli
    binary: flink
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: flink-server
    main: ./server
    binary: flink-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: flink
    ids:
      - flink
    name_template: >-
      flink_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - tar.gz
    files:
      - README.md
      - AGENTS.md

  - id: flink-server
    ids:
      - flink-server
    name_template: >-
      flink-server_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - tar.gz
    files:
      - README.md
      - src: server/extras/*
        dst: extras

checksum:
  name_template: checksums.txt

dockers:
  - image_templates:
      - "ghcr.io/csweichel/flink-server:{{ .Tag }}-amd64"
    dockerfile: server/Dockerfile
    use: buildx
    ids:
      - flink-server
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"

  - image_templates:
      - "ghcr.io/csweichel/flink-server:{{ .Tag }}-arm64"
    dockerfile: server/Dockerfile
    use: buildx
    ids:
      - flink-server
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/csweichel/flink-server:{{ .Tag }}"
    image_templates:
      - "ghcr.io/csweichel/flink-server:{{ .Tag }}-amd64"
      - "ghcr.io/csweichel/flink-server:{{ .Tag }}-arm64"

  - name_template: "ghcr.io/csweichel/flink-server:latest"
    image_templates:
      - "ghcr.io/csweichel/flink-server:{{ .Tag }}-amd64"
      - "ghcr.io/csweichel/flink-server:{{ .Tag }}-arm64"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
