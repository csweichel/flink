services:
  flink:
    name: Flink server
    description: Runs the Flink dashboard, static hosting, APIs, uploads, and WebSocket rooms.
    triggeredBy:
      - manual
    commands:
      start: |
        set -eu
        mkdir -p .flink
        cat > .flink/ona.yaml <<'EOF'
        addr: :8080
        dataDir: ./data
        storage: file
        baseHost: ""
        autoApproveTenants: true
        disableTenantRegistration: false
        defaultSiteAuthMode: owner
        ai:
          apiKey: ""
          baseURL: https://api.openai.com/v1
          model: gpt-4.1-mini
        bootstrapTenants:
          - username: demo
            password: flink
        EOF
        gitpod environment port open 8080 --name flink --protocol http || true
        printf 'Flink demo login: username=demo password=flink\n'
        make run CONFIG=.flink/ona.yaml
      ready: |
        curl -fsS http://localhost:8080/flink.js >/dev/null
        curl -fsS -u demo:flink http://localhost:8080/api/sites >/dev/null

tasks:
  build:
    name: Build Flink
    command: make build

  test:
    name: Test Flink
    command: make test
